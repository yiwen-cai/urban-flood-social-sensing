name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.lock

      - name: Unit, schema, and privacy contract tests
        run: python -m pytest tests/ -q

      - name: Real offline E2E pipeline (no API)
        env:
          MPLCONFIGDIR: /tmp/matplotlib
        run: bash run_pipeline.sh

      - name: Synthetic offline E2E pipeline
        env:
          MPLCONFIGDIR: /tmp/matplotlib
        run: bash run_pipeline.sh --fixture --offline

      - name: Privacy scan tracked tree
        run: |
          python - <<'PY'
          import subprocess
          from pathlib import Path
          root = Path('.')
          tracked = subprocess.check_output(['git', 'ls-files', '-z']).split(b'\0')
          allowed_jsonl = {
              'data/analyzed/posts_labeled.jsonl',
              'data/analyzed/predictions.jsonl',
          }
          failures = []
          for raw in tracked:
              if not raw:
                  continue
              path = raw.decode()
              if path.startswith('data/') and path.endswith('.jsonl') and path not in allowed_jsonl:
                  failures.append(f'unexpected tracked data jsonl: {path}')
                  continue
          public = root / 'data' / 'output' / 'metrics.public.json'
          if not public.is_file():
              failures.append('missing data/output/metrics.public.json')
          else:
              blob = public.read_text(encoding='utf-8')
              if 'text_clean' in blob:
                  failures.append('public metrics must not contain text_clean')
          # Tracked tip must still contain the real inputs even after fixture overwrite of the working tree.
          # Verify via git show rather than the working-tree files that fixture mode replaces.
          for rel in allowed_jsonl:
              blob = subprocess.check_output(['git', 'show', f'HEAD:{rel}'])
              if not blob.strip():
                  failures.append(f'missing tracked content for {rel}')
          if failures:
              raise SystemExit('\n'.join(failures))
          print('privacy scan passed')
          PY
