# Lab 2 labeling schema.
#
# This file is a direct transcription of the label sets already frozen in
# schemas/post.schema.json ($defs.humanitarian_label / $defs.exploratory_emotion)
# and docs/project/DATA_GATE.md section 3. It does not introduce new labels or
# boundaries; if this file and post.schema.json ever disagree, the schema wins
# and this file must be corrected to match (see 实施方案.md section 3.2).

schema_version: "1.0.0"

# Official HumAID nine-class task. Single-label per record. This is the
# reference_label / predicted_label vocabulary and is not open for redefinition
# by this course project.
humanitarian_label:
  single_label: true
  source: "HumAID Kerala floods 2018 (QCRI)"
  labels:
    - name: caution_and_advice
      description: "Warnings, safety instructions, or advice related to the flood."
    - name: displaced_people_and_evacuations
      description: "People displaced from their homes or undergoing evacuation."
    - name: infrastructure_and_utility_damage
      description: "Damage to roads, bridges, power, water, or other infrastructure/utilities."
    - name: injured_or_dead_people
      description: "Reports of injury or death caused by the flood."
    - name: not_humanitarian
      description: "Not related to humanitarian aspects of the disaster."
    - name: other_relevant_information
      description: "Relevant to the event but does not fit the other categories."
    - name: requests_or_urgent_needs
      description: "Requests for rescue, supplies, medical help, or other urgent needs."
    - name: rescue_volunteering_or_donation_effort
      description: "Rescue operations, volunteering, or donation/relief efforts."
    - name: sympathy_and_support
      description: "Expressions of sympathy, support, or solidarity."

# Course-created exploratory metadata. Single-label per record. Stored and
# reported separately from the official nine-class task (DATA_GATE.md section 3);
# must never be treated as ground truth or mixed into the official evaluation.
exploratory_emotion:
  single_label: true
  source: "course-created, not part of the original HumAID annotation"
  labels:
    - name: fear_or_anxiety
      description: "恐慌/焦虑"
    - name: anger
      description: "愤怒"
    - name: sadness
      description: "悲伤"
    - name: positive_support
      description: "积极支持"
    - name: neutral_or_unclear
      description: "中性/无法判断"

# evidence_status vocabulary from post.schema.json $defs.lab2.evidence_status.
# Model scores are for ranking only and must never be reported as calibrated
# probabilities (实施方案.md section 3.2).
evidence_status:
  - dataset_record
  - human_labeled
  - model_prediction
