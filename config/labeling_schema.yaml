# Lab 2 标签体系定义
# 用途：情感与观点分析的标签规范
# 维护：成员 B
# 使用方：成员 C（Lab 3 简报生成时参考）

# ====== 情感标签 ======
sentiment:
  labels:
    - 恐慌     # 面对突发危险时的恐惧反应
    - 焦虑     # 对不确定情况的担忧
    - 愤怒     # 对事件或应对的不满
    - 悲伤     # 对伤亡和损失的心痛
    - 中性     # 陈述事实、转述信息、不含明显情绪
    - 无法判断 # 文本信息不足以判断情绪

  note: |
    允许一条帖子同时标注多个情感标签（多标签分类），
    每个标签附带 0-1 的置信度分数。取最高分为 primary。

# ====== 信息功能标签 ======
information_type:
  labels:
    - 求助       # 明确请求救援、帮助或物资
    - 灾情报告   # 描述灾情现状（积水、受损、人员情况等）
    - 交通影响   # 涉及交通中断、停运、道路状况
    - 物资需求   # 表达物资短缺或资源供给信息
    - 警告       # 提醒他人注意危险或风险
    - 辟谣       # 官方或权威机构发布的澄清信息
    - 一般讨论   # 表达关切、转发、讨论，不包含明确诉求
    - 待核实     # 信息真实性存疑，需要进一步核实

  note: |
    与情感标签不同，信息功能标签描述帖子在灾害沟通中的"功能角色"。
    这是本项目区别于普通情感分析的核心维度。

# ====== 实体类型 ======
entities:
  infrastructure:
    - 道路
    - 地铁
    - 铁路
    - 电力
    - 通讯
    - 供水
    - 房屋
    - 车辆
    - 桥梁
    - 隧道
    - 水库
    - 河流
    - 医院
    - 学校

  demand:
    - 救援
    - 物资
    - 医疗
    - 信息
    - 疏散
    - 其他

# ====== 紧急程度 ======
urgency:
  levels:
    - high    # 涉及生命安全、即时救援需求
    - medium  # 涉及基础设施、物资、信息需求
    - low     # 一般性描述、已解决、事后讨论
