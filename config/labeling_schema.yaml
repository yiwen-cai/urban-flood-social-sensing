# Lab 2 标签体系定义
# 用途：情感与观点分析的标签规范
# 维护：成员 B
# 对应实施方案 4.2 节

# ====== 主情绪（单标签分类） ======
primary_emotion:
  description: |
    每条帖子只选一个主要情绪。如果一条文本同时包含强烈情绪和事实陈述，
    以主要情绪为准。无法判断时标注"中性/无法判断"。
  labels:
    - 恐慌/焦虑    # 面对突发危险或不确定情况的不安和恐惧
    - 愤怒         # 对事件或应对的不满、指责
    - 悲伤         # 对伤亡和损失的心痛、哀悼
    - 积极支持     # 鼓励、感谢、团结、救援消息
    - 中性/无法判断 # 纯粹事实陈述、转发、无情绪或无法判断

# ====== 信息功能（多标签分类） ======
information_type:
  description: |
    描述帖子在灾害沟通中的功能角色。一条文本可以有多个标签。
    分析侧设置 0.5 为默认保留阈值；最终报告中低于该阈值的标签只
    在评估报告中展示，不得进入简报证据链条。
  labels:
    - 求助/紧急需求     # 明确请求救援、帮助、物资或失联寻人
    - 援助/资源提供     # 提供救援、物资、志愿服务或捐款渠道
    - 灾情/设施影响     # 描述积水、受损、停运、断电断水等现状
    - 警告/建议         # 提醒他人注意危险、给出安全建议
    - 质疑/错误信息讨论 # 对信息真实性提出疑问、讨论或传播可疑消息
    - 其他              # 以上类别均不适用的一般性讨论

  # 保留阈值：model_scores 中低于此值的标签不出现在简报证据链中
  default_score_threshold: 0.5

# ====== 关键实体 ======
entities:
  infrastructure:
    - 道路
    - 地铁
    - 铁路
    - 电力
    - 通讯
    - 供水
    - 房屋
    - 车辆
    - 桥梁
    - 隧道
    - 水库
    - 河流

  demand:
    - 救援
    - 物资
    - 医疗
    - 信息
    - 疏散

# ====== 证据状态（所有 Lab 2 分析结果统一标注） ======
evidence_status:
  description: |
    区分数据来源和可信程度。该字段不得写成"已核验事实"——
    任何状态都不能自动代表事实核验。
  values:
    - dataset_record      # 数据集中存在该记录
    - human_labeled       # 课程成员已完成人工标注
    - model_prediction    # 模型输出，未经人工确认
    - external_reference  # 来自独立权威资料（如气象数据）
